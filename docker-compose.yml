services:
  db:
    image: postgres:16-alpine
    container_name: filrouge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    container_name: filrouge-server
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgres://app:app_password@db:5432/appdb
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  client:
    build: ./client
    container_name: filrouge-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  postgres_data:
